# Plaintext structural example of the secrets file.
#
# DO NOT COMMIT A PLAINTEXT COPY OF secrets/family-cloud.enc.yaml.
# This .example.yaml file only shows the expected shape so consumers of the Tofu code
# know which keys to reference.
#
# To create the real encrypted file (one-time, after generating your age keypair):
#
#   sops --encrypt --in-place secrets/family-cloud.enc.yaml
#
# To edit after creation:
#
#   sops secrets/family-cloud.enc.yaml

hcloud_token: "<Hetzner Cloud API token — PREREQUISITES.md §2>"

hcloud_s3_access_key: "<Hetzner Object Storage access key — PREREQUISITES.md §3>"
hcloud_s3_secret_key: "<Hetzner Object Storage secret key — PREREQUISITES.md §3>"

tailscale_authkey: "<Tailscale auth key, tskey-auth-... — PREREQUISITES.md §4>"

postgres_password: "<Strong random string, e.g. `openssl rand -base64 32`>"

nextcloud_admin_password: "<Strong random string for the initial 'admin' user>"
